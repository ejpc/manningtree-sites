<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rileys Barbers - Scan Me</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;background:#16171b;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px;}
  .card{background:#f3efe6;border-radius:26px;max-width:380px;width:100%;text-align:center;
    padding:40px 34px;box-shadow:0 18px 50px rgba(0,0,0,.35);border:3px solid #c8a24a;}
  .name{font-family:Georgia,serif;font-size:34px;color:#16171b;letter-spacing:1px;line-height:1.05;}
  .place{display:block;font-size:12px;letter-spacing:6px;color:#c8a24a;margin-top:8px;}
  .deco{width:60px;height:3px;background:#c8a24a;margin:18px auto;border-radius:3px;}
  .qr{background:#fff;display:inline-block;padding:16px;border-radius:18px;
    box-shadow:0 6px 16px rgba(0,0,0,.12);}
  .qr img{display:block;width:220px;height:220px;}
  .scan{font-family:Georgia,serif;font-size:22px;color:#16171b;margin-top:22px;}
  .tag{color:#16171b;opacity:.7;font-size:15px;margin-top:6px;font-style:italic;}
</style></head>
<body>
  <div class="card">
    <div class="name serif">Rileys Barbers<span class="place">MANNINGTREE</span></div>
    <div class="deco"></div>
    <div class="qr"><img src="qr-code.png" alt="QR code linking to the Rileys Barbers website"></div>
    <div class="scan">Scan to see our website</div>
    <div class="tag">Cuts, fades &amp; beard trims on the High Street</div>
  </div>
</body></html>
